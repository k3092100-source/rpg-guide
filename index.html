<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《要拚實況RPG》官方指南 - 萌萌吃吃</title>
    <style>
        :root {
            --gold: #ffd700;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
            --neon-blue: #00d4ff;
            --neon-pink: #ff00ff;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            font-family: "Microsoft JhengHei", sans-serif;
            color: #eee;
            line-height: 1.7;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .container {
            max-width: 950px; margin: 40px auto; padding: 50px;
            background: var(--panel-bg);
            border: 2px solid #333; border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,215,0,0.1);
            backdrop-filter: blur(10px);
            /* ❌ 已移除 floatPage 動畫，讓頁面保持穩定 */
        }

        .header-info { text-align: center; color: #777; font-size: 0.9em; letter-spacing: 1px; margin-bottom: 10px; }

        h1 {
            text-align: center; color: var(--gold); font-size: 3.5em;
            text-shadow: 0 0 15px rgba(255,215,0,0.7);
            margin-bottom: 5px; animation: neonPulse 2s infinite alternate;
        }

        h2 {
            border-bottom: 2px solid var(--gold); padding-bottom: 12px;
            margin-top: 50px; color: #fff; font-size: 2em;
            display: flex; align-items: center;
        }
        h2::before { content: '✨'; margin-right: 15px; color: var(--gold); }

        .highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .pink-light { color: var(--neon-pink); font-weight: bold; }

        .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 30px; margin-top: 25px; }
        .job-box {
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 12px;
            border: 1px solid #333; border-left: 6px solid #ccc;
            transition: all 0.3s ease;
        }
